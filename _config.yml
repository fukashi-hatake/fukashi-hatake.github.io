# Site settings
course_name: Artificial Intelligence - ISS3198
course_description: |
  The course introduces the core principles underlying modern AI systems with an emphasis on machine
  learning and deep learning techniques. The course explores supervised and unsupervised learning,
  neural networks, computer vision, natural language processing, reinforcement learning, and
  generative models. Students will develop a conceptual understanding of how contemporary AI systems
  are designed, trained, evaluated, and deployed across real-world domains such as healthcare, security,
  robotics, and social media.

  In addition to technical foundations, the course examines critical issues including model generalization,
  robustness, bias, safety, and ethical implications of AI technologies. Designed for undergraduate
  students, the course emphasizes analytical reasoning and system-level understanding rather than
  advanced mathematical derivations or programming requirements. By the end of the course, students
  will be able to explain how modern AI models function, evaluate their strengths and limitations, and
  understand their broader societal impact.
course_semester: "Summer 2026"

